<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank Transaction Demo</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="shortcut icon" href="ic.png" type="image/x-icon" />
</head>

<body>
  <h1>Bank Transfer Demo</h1>

  <div class="demo-controls">
    <button type="button" onclick="transferWithTx()">Transfer (With TX)</button>
    <button type="button" class="btn-warning" onclick="transferNoTx()">
      Transfer NO TX (Race Condition)
    </button>
    <button type="button" class="btn-warning" onclick="transferSlow()">
      Transfer SLOW (Lock Demo)
    </button>
    <button type="button" class="btn-secondary" onclick="resetData()">
      🔄 Reset Data
    </button>
    <!-- adding account button -->
    <button type="button" class="btn-warning" onclick="openNewAccountBox()">
      New Account
    </button>
  </div>
  <div id="newAccountBox" class="new-account-box hidden">
    <h3>New Account</h3>

    <label for="newAccountName">Name</label>
    <input id="newAccountName" type="text" required placeholder="Account name" />

    <label for="newAccountBalance">Balance</label>
    <input id="newAccountBalance" type="number" min="0" step="0.01" value="0.00" />

    <div class="new-account-actions">
      <button type="button" onclick="submitNewAccount()">Create</button>
      <button type="button" onclick="closeNewAccountBox()">Cancel</button>
    </div>
  </div>

  <div id="accounts"></div>

  <h2>Transfer Money</h2>

  <form id="transferForm">
    <label for="from">From:</label>
    <select id="from"></select>

    <label for="to">To:</label>
    <select id="to"></select>

    <label for="amount">Amount:</label>
    <input type="number" id="amount" min="1" placeholder="Enter amount..." />

    <button type="submit">Transfer</button>
  </form>

  <h2>Transaction Flow</h2>

  <div id="timeline" class="timeline"></div>
  <p id="message"></p>

  <h2>Transaction History</h2>

  <button class="btn-secondary" onclick="loadTransactions()" style="margin-bottom: 15px;">Load History</button>

  <table id="historyTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Sender</th>
        <th>Receiver</th>
        <th>Amount</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="script.js"></script>
</body>

</html>
