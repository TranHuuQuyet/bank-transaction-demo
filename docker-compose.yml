services:
  mysql:
    image: mysql:8
    container_name: bank_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bank_demo
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: .
    container_name: bank_backend
    ports:
      - "3000:3000"
    depends_on:
      - mysql

volumes:
  mysql_data:
